name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # The full gate re-runs at the release commit; a red gate fails the tag.
      - run: make check
      - name: Extract release notes from CHANGELOG.md
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            $0 ~ "^## \\[" ver "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > /tmp/notes.md
          test -s /tmp/notes.md || echo "See CHANGELOG.md." > /tmp/notes.md
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean --release-notes /tmp/notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
