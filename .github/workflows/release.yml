name: Release

on:
  push:
    tags: ["v*"]

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            Makefile
      - name: Extract release notes from CHANGELOG.md
        run: |
          awk '
            /^## \[Unreleased\]$/ {p=1; next}
            p && /^## \[/ {exit}
            p && /^- / {exit 1}
          ' CHANGELOG.md
          awk -v ver="${GITHUB_REF_NAME#v}" '
            $0 ~ "^## \\[" ver "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > /tmp/notes.md
          test -s /tmp/notes.md
      - name: Build release artifacts without publishing
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: v2.17.0
          args: release --clean --skip=publish --release-notes /tmp/notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify source archive
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          source_archive="dist/pigo_${version}_source.tar.gz"
          test -f "${source_archive}"
          grep -F "pigo_${version}_source.tar.gz" dist/checksums.txt
          (cd dist && sha256sum -c checksums.txt)
          build_root="$(mktemp -d)"
          trap 'rm -rf "${build_root}"' EXIT
          tar -xzf "${source_archive}" -C "${build_root}"
          source_root="${build_root}/pigo-${version}"
          test -f "${source_root}/go.mod"
          test -f "${source_root}/cmd/pigo/main.go"
          test -f "${source_root}/codingagent/modes/assets/CHANGELOG.md"
          if tar -tzf "${source_archive}" | grep -Eq '(^|/)(\.git|\.upstream|dist|node_modules)(/|$)'; then
            echo "source archive contains generated or private state" >&2
            exit 1
          fi
          (cd "${source_root}" && CGO_ENABLED=0 go build -buildvcs=false ./...)
          (cd "${source_root}" && CGO_ENABLED=0 go build -buildvcs=false -trimpath -o /tmp/pigo-source-check ./cmd/pigo)
          sha256sum "${source_archive}" > /tmp/pigo-source.sha256
      - name: Require green CI for tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for _ in $(seq 1 60); do
            state="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&event=push&per_page=1" \
              --jq '.workflow_runs[0] | [.status, .conclusion] | join(":")')"
            case "${state}" in
              completed:success) exit 0 ;;
              completed:*) echo "CI failed: ${state}" >&2; exit 1 ;;
            esac
            sleep 10
          done
          echo "timed out waiting for CI" >&2
          exit 1
      - name: Publish verified release artifacts
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: v2.17.0
          args: release --clean --release-notes /tmp/notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify published source archive is deterministic
        run: sha256sum -c /tmp/pigo-source.sha256
