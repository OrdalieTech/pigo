version: 2
project_name: pi
builds:
  - id: pi
    main: ./cmd/pi
    binary: pi
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -funcalign=4 -X main.version={{.Version}}
archives:
  - formats: [tar.gz]
    name_template: "pi_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
brews:
  - name: pi
    repository:
      owner: OrdalieTech
      name: homebrew-tap
    skip_upload: true
    homepage: https://github.com/OrdalieTech/pi-go
    description: Faithful, slim, pure-Go port of the pi coding agent
    license: MIT
    install: bin.install "pi"
    test: system "#{bin}/pi", "--version"
checksum:
  name_template: checksums.txt
release:
  prerelease: auto
changelog:
  disable: true
