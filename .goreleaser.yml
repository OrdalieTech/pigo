version: 2
project_name: pigo
builds:
  - id: pigo
    main: ./cmd/pigo
    binary: pigo
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -funcalign=4 -X main.version={{.Version}}
archives:
  - formats: [tar.gz]
    name_template: "pigo_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
source:
  enabled: true
  name_template: "pigo_{{ .Version }}_source"
  format: tar.gz
  prefix_template: "pigo-{{ .Version }}/"
homebrew_casks:
  - name: pigo
    repository:
      owner: OrdalieTech
      name: homebrew-tap
    skip_upload: true
    homepage: https://github.com/OrdalieTech/pigo
    description: Faithful, slim, pure-Go port of the pi coding agent
    license: MIT
checksum:
  name_template: checksums.txt
release:
  prerelease: auto
changelog:
  disable: true
